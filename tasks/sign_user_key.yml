---
- name: "Sign the user local private key"
  tags:
    - sign_user_key
  vars:
    ca_key_type: "priopenssh"
    ca_type: "userca"
    user_ssh_key_filename: "{{ user }}-{{ env }}-{{ site }}"
    # Comment on the agent-loaded key, e.g. set when adding via Bitwarden.
    # Format is two whitespace-separated tokens: "ssh-certs <filename>".
    agent_key_comment: "ssh-certs {{ user_ssh_key_filename }}"
  block:
    # Flow A: generate a local Ed25519 keypair if one does not already exist.
    - name: "Generate an Ed25519 OpenSSH keypair"
      community.crypto.openssh_keypair:
        path: "~/.ssh/{{ user_ssh_key_filename }}"
        type: ed25519
        mode: 0600
        force: false
        comment: "Generated by ssh-certs ansible role (https://github.com/genirohtea/ssh-certs) for {{ user_ssh_key_filename }}"
      register: user_key
      when: user_key_source == "generate"

    # Flow B: pull the user public key from the running ssh-agent (loaded from
    # Bitwarden), matched by comment == agent_key_comment. The private key
    # never touches disk.
    - name: "Pull user public key from ssh-agent"
      when: user_key_source == "agent"
      block:
        - name: "Find the user public key in the SSH agent by comment"
          ansible.builtin.shell:
            cmd: |
              set -euo pipefail
              if ! listing=$(ssh-add -L 2>&1); then
                echo "ssh-agent unreachable or has no identities: $listing" >&2
                exit 1
              fi
              # ssh-add -L lines are: "<type> <base64-blob> <comment...>".
              # Strip the first two fields to isolate the comment, then match
              # the whole comment exactly against agent_key_comment (which may
              # contain spaces, e.g. "ssh-certs <filename>").
              matches=$(printf '%s\n' "$listing" | awk -v c="{{ agent_key_comment }}" '
                { line = $0; $1=""; $2=""; sub(/^ +/, ""); if ($0 == c) print line }
              ')
              count=$(printf '%s' "$matches" | grep -c . || true)
              if [ "$count" -ne 1 ]; then
                echo "Expected exactly 1 key in ssh-agent with comment '{{ agent_key_comment }}', found $count" >&2
                exit 1
              fi
              printf '%s\n' "$matches"
          register: agent_pubkey
          changed_when: false

        - name: "Write the agent public key to disk for signing"
          ansible.builtin.copy:
            content: "{{ agent_pubkey.stdout }}\n"
            dest: "~/.ssh/{{ user_ssh_key_filename }}.pub"
            mode: "0644"

    - name: "Fail on unknown user_key_source"
      ansible.builtin.fail:
        msg: "user_key_source must be 'generate' or 'agent', got: {{ user_key_source }}"
      when: user_key_source not in ["generate", "agent"]

    - name: "Retrieving secrets using BWS"
      block:
        - name: "Get secret value"
          ansible.builtin.set_fact:
            ssh_key: "{{ lookup('community.general.bitwarden_secrets_manager', bws_secret_ids[ca_type + '-' + ca_key_type]).value }}"

      rescue:
        - name: "Getting secrets from BWS failed"
          ansible.builtin.set_fact:
            task_failed: true

    - name: Create secret CA private keytmp file with only my access
      ansible.builtin.tempfile:
        state: file
        suffix: _ca_private_key
      register: ssh_key_file

    - name: Ensure file is only readable by me
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        mode: 0600

    - name: Write secret to tmpfile
      ansible.builtin.lineinfile:
        state: present
        dest: "{{ ssh_key_file.path }}"
        line: "{{ ssh_key }}"

    - name: Remove any existing certificate
      ansible.builtin.file:
        path: "~/.ssh/{{ user_ssh_key_filename }}-cert.pub"
        state: absent

    - name: Sign the user ssh key
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          ssh-keygen -s {{ ssh_key_file.path }} -I {{ user }} -n {{ principals }} -V {{ expiry }} ~/.ssh/{{ user_ssh_key_filename }}.pub
        creates: "~/.ssh/{{ user_ssh_key_filename }}-cert.pub"

    - name: Check the signed the user ssh key
      ansible.builtin.shell: >-
        set -o pipefail;
        ssh-keygen -L -f ~/.ssh/{{ user_ssh_key_filename }}-cert.pub
      changed_when: false

  rescue:
    - name: "Signing using User CA failed"
      ansible.builtin.set_fact:
        task_failed: true

  always:
    # Always delete the on-disk CA private key, even if signing failed
    - name: Delete CA private key tempfile
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        state: absent
      when: ssh_key_file.path is defined

    # In the agent flow, the .pub on disk is only a transient input to ssh-keygen -s.
    # The agent remains the source of truth for the user keypair; the cert is
    # self-contained for SSH auth. Removed even if signing failed.
    - name: Delete transient user public key (agent flow only)
      ansible.builtin.file:
        path: "~/.ssh/{{ user_ssh_key_filename }}.pub"
        state: absent
      when: user_key_source == "agent"
