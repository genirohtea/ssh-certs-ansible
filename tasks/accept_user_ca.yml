---
- name: "Accept the user CA certificate"
  tags:
    - accept_user_ca
  vars:
    ca_key_type: "pubopenssh"
    ca_type: "userca"
    ca_public_key_path: "/etc/ssh/kvk-{{ service_name }}-{{ env }}-{{ site }}-{{ ca_type }}-{{ ca_key_type }}.pub"
  block:
    - name: "Retrieving secrets using BWS"
      block:
        - name: "Get secret value"
          ansible.builtin.set_fact:
            ssh_key: "{{ lookup('community.general.bitwarden_secrets_manager', bws_secret_ids[ca_type + '-' + ca_key_type]).value }}"

      rescue:
        - name: "Getting secrets from BWS failed"
          ansible.builtin.set_fact:
            task_failed: true

    - name: Create secret CA private keytmp file with only my access
      ansible.builtin.tempfile:
        state: file
        suffix: _ca_private_key
      register: ssh_key_file

    - name: Remove any existing public key
      ansible.builtin.file:
        path: "{{ ca_public_key_path }}"
        state: absent

    - name: Ensure file is only readable by me
      ansible.builtin.lineinfile:
        state: present
        create: true
        path: "{{ ca_public_key_path }}"
        owner: root
        group: root
        line: "{{ ssh_key }}"
        mode: 0600

    - name: Mark sshd_config TrustedUserCAKeys as managed by this repo
      ansible.builtin.blockinfile:
        path: "/etc/ssh/sshd_config"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: {{ service_name }} TrustedUserCAKeys {{ env }}/{{ site }}"
        block: |
          # Purpose: tell sshd to accept user logins authenticated by
          #   certificates signed by our user CA (instead of, or in addition
          #   to, raw public keys in ~/.ssh/authorized_keys).
          # Managed by the ssh-certs ansible role
          # Source: https://github.com/genirohtea/ssh-certs
          # Configured via: ansible/setup_host_server.sh (accept_user_ca tag)
          TrustedUserCAKeys {{ ca_public_key_path }}
        insertafter: "HostCertificate"

    - name: Restart the sshd daemon
      ansible.builtin.service:
        name: sshd
        state: restarted

  rescue:
    - name: "Configuring to accept User CA failed"
      ansible.builtin.set_fact:
        task_failed: true

  always:
    # Always delete the on-disk CA private key, even if signing failed
    - name: Delete CA private key tempfile
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        state: absent
      when: ssh_key_file.path is defined
