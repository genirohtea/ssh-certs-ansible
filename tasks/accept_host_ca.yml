---
- name: "Accept the host CA"
  tags:
    - accept_host_ca
  vars:
    # Azure Implementation
    ca_key_type: "pubopenssh"
    ca_type: "hostca"
    vault_name: "kv-{{ service_name }}-{{ env }}-{{ site }}"
    secret_name: "kvk-{{ service_name }}-{{ env }}-{{ site }}-{{ ca_type }}-{{ ca_key_type }}"
    resource_group_name: "rg-{{ service_name }}-{{ env }}-{{ site }}"

    # General
    user_ssh_key_filename: "{{ user }}-{{ env }}-{{ site }}"

  block:
    - name: "Retrieving secrets using Azure"
      when: use_azure | bool
      block:
        - name: Get Key Vault by name
          azure.azcollection.azure_rm_keyvault_info:
            resource_group: "{{ resource_group_name }}"
            name: "{{ vault_name }}"
          register: key_vault_attrs

        - name: Set key vault URI fact
          set_fact:
            key_vault_uri: "{{ key_vault_attrs['keyvaults'][0]['vault_uri'] }}"

        - name: Get secret value
          azure.azcollection.azure_rm_keyvaultsecret_info:
            vault_uri: "{{ key_vault_uri }}"
            name: "{{ secret_name }}"
          register: ssh_key_attrs

        - name: Set secret fact
          ansible.builtin.set_fact:
            ssh_key: "{{ ssh_key_attrs.secrets[0].secret }}"

      rescue:
        - name: "Getting secrets from Azure failed"
          ansible.builtin.set_fact:
            task_failed: true

    - name: "Retrieving secrets using BWS"
      when: not (use_azure | bool)
      block:
        - name: "Get secret value"
          ansible.builtin.set_fact:
            ssh_key: "{{ lookup('community.general.bitwarden_secrets_manager', bws_secret_ids[ca_type + '-' + ca_key_type]).value }}"

      rescue:
        - name: "Getting secrets from BWS failed"
          ansible.builtin.set_fact:
            task_failed: true

    - name: Create secret CA private keytmp file with only my access
      ansible.builtin.tempfile:
        state: file
        suffix: _ca_private_key
      register: ssh_key_file

    - name: Ensure file is only readable by me
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        mode: 0600

    - name: Add cert authority for hostkey checking
      ansible.builtin.blockinfile:
        path: "~/.ssh/known_hosts"
        create: true
        mode: 0600
        marker: "# {mark} ANSIBLE MANAGED BLOCK: {{ service_name }} cert-authority {{ env }}/{{ site }} {{ domain }}"
        block: |
          # Purpose: tell the local ssh client to trust host certificates
          #   matching {{ domain }} that were signed by our host CA, so
          #   connections succeed without a TOFU prompt and stay trusted
          #   across host-key rotations.
          # Managed by the ssh-certs ansible role
          # Source: https://github.com/genirohtea/ssh-certs
          # Configured via: ansible/setup_user_workstation.sh (accept_host_ca tag)
          @cert-authority {{ domain }} {{ ssh_key }}

    - name: Add host stanza to ssh config
      ansible.builtin.blockinfile:
        path: "~/.ssh/config"
        create: true
        mode: 0600
        marker: "# {mark} ANSIBLE MANAGED BLOCK: {{ service_name }} host-stanza {{ env }}/{{ site }} {{ domain }}"
        block: |
          # Purpose: host stanza auto-managed by the ssh-certs ansible role
          # using key: {{ user_ssh_key_filename }}
          # Source: https://github.com/genirohtea/ssh-certs
          # Configured via: ansible/setup_user_workstation.sh (accept_host_ca tag)
          Host {{ domain }}
            StrictHostKeyChecking yes
            User root
            IdentityFile ~/.ssh/{{ user_ssh_key_filename }}
            AddKeysToAgent yes
            # Multiplex connections since we use ansible quite a bit
            ControlMaster auto
            ControlPersist 600
            # We generally dont need agent forwarding and it adds a security risk
            ForwardAgent no
  rescue:
    - name: "Configuring to accept Host CA failed"
      ansible.builtin.set_fact:
        task_failed: true

  always:
    # Always delete the on-disk CA private key, even if signing failed
    - name: Delete CA private key tempfile
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        state: absent
      when: ssh_key_file.path is defined
