---
- name: "Sign the user host private key"
  tags:
    - sign_host_key
  vars:
    ca_key_type: "priopenssh"
    ca_type: "hostca"

    # Default Ed25519 host key path on all standard linux installs of ssh
    host_key_path: "/etc/ssh/ssh_host_ed25519_key"
  block:
    - name: Check that host has pregenerated ssh key
      ansible.builtin.stat:
        path: "{{ host_key_path }}"
      register: host_key_exists

    - name: Assert that host has pregenerated ssh key
      ansible.builtin.assert:
        that: host_key_exists.stat.exists
        fail_msg: "Host ssh key does not exist"

    - name: "Retrieving secrets using BWS"
      block:
        - name: "Get secret value"
          ansible.builtin.set_fact:
            ssh_key: "{{ lookup('community.general.bitwarden_secrets_manager', bws_secret_ids[ca_type + '-' + ca_key_type]).value }}"

      rescue:
        - name: "Getting secrets from BWS failed"
          ansible.builtin.set_fact:
            task_failed: true

    - name: Create secret CA private keytmp file with only my access
      ansible.builtin.tempfile:
        state: file
        suffix: _ca_private_key
      register: ssh_key_file

    - name: Ensure file is only readable by me
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        mode: 0600

    - name: Write secret to tmpfile
      ansible.builtin.lineinfile:
        state: present
        dest: "{{ ssh_key_file.path }}"
        line: "{{ ssh_key }}"

    - name: Remove any existing certificate
      ansible.builtin.file:
        path: "{{ host_key_path }}-cert.pub"
        state: absent

    - name: Sign the host ssh key
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          ssh-keygen -s {{ ssh_key_file.path }} -I {{ identity }} -h -n {{ principals }} -V {{ expiry }} {{ host_key_path }}.pub
        creates: "{{ host_key_path }}-cert.pub"
      args:
        executable: /bin/bash

    - name: Check the signed the host ssh key
      ansible.builtin.shell: >-
        set -o pipefail;
        ssh-keygen -L -f {{ host_key_path }}-cert.pub
      args:
        executable: /bin/bash
      changed_when: false

    - name: Mark sshd_config HostCertificate as managed by this repo
      ansible.builtin.blockinfile:
        path: "/etc/ssh/sshd_config"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: {{ service_name }} HostCertificate {{ env }}/{{ site }}"
        block: |
          # Purpose: tell sshd to present this signed host certificate to
          #   connecting clients, so clients that have our host CA marked
          #   @cert-authority can trust this server without a TOFU prompt.
          # Managed by the ssh-certs ansible role
          # Source: https://github.com/genirohtea/ssh-certs
          # Configured via: ansible/setup_host_server.sh (sign_host_key tag)
          HostCertificate {{ host_key_path }}-cert.pub
        insertafter: "HostKey"

    - name: Restart the sshd daemon
      ansible.builtin.service:
        name: sshd
        state: restarted

  rescue:
    - name: "Signing using Host CA failed"
      ansible.builtin.set_fact:
        task_failed: true

  always:
    # Always delete the on-disk CA private key, even if signing failed
    - name: Delete CA private key tempfile
      ansible.builtin.file:
        path: "{{ ssh_key_file.path }}"
        state: absent
      when: ssh_key_file.path is defined
