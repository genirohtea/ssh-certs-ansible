---
# MANAGED BY TEMPLATE (copied 2026-05-23 from 6bed4) — do not edit. Sync from the source template; user must manage overwrites.
# Test locally using prek run --all-files (or pre-commit run --all-files)
# This config is consumed by prek (https://github.com/j178/prek), a
# drop-in Rust replacement for pre-commit. The schema is identical.
# exclude: |
#   (?x)^(folderA|
#       folderB)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: double-quote-string-fixer
        # Exclude python: ruff-format owns python quote style (double quotes)
        # and would re-flip anything this hook converts.
        exclude_types: [python]
      # No EOF fixers since most files are managed by external plugin manager
      - id: mixed-line-ending
      - id: name-tests-test
      - id: sort-simple-yaml
      - id: pretty-format-json
        args:
          - "--autofix"
      - id: requirements-txt-fixer
      - id: trailing-whitespace
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-crlf
      - id: remove-tabs
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - "--ignore-words-list=iterm"
  # Shell: shellcheck (lint) + shfmt (format) + executable-shebang check above.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-w"]
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        alias: ec
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ["-c=.yamllint.yml"]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        # CHANGELOG.md is generated by release-please; its repeated
        # Features/Bug Fixes headings under each version trip MD024.
        exclude: ^CHANGELOG\.md$
  - repo: https://github.com/hukkin/mdformat
    # Formats markdown tables (replaces megalinter's
    # MARKDOWN_MARKDOWN_TABLE_FORMATTER) via the mdformat-tables plugin.
    rev: 0.7.22
    hooks:
      - id: mdformat
        args: ["--wrap=210"]
        additional_dependencies:
          - mdformat-tables
          - mdformat-gfm
        exclude: ^CHANGELOG\.md$
  # check-jsonschema replaces megalinter's *_V8R linters: it validates
  # well-known JSON/YAML files (workflows, dependabot, renovate, etc.)
  # against schemas from schemastore.org.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-github-workflows
      - id: check-github-actions
      - id: check-dependabot
      - id: check-renovate
        additional_dependencies: ["pyjson5"]
  # Lychee link checker (replaces megalinter's SPELL_LYCHEE).
  # Requires the `lychee` binary on PATH (`brew install lychee`,
  # `cargo install lychee`, or via mise).
  - repo: local
    hooks:
      - id: lychee
        name: lychee
        entry: lychee --no-progress --config .lychee.toml
        language: system
        types: [text]
        require_serial: true
        # Run on demand / in CI; skip on every commit so offline work isn't blocked.
        stages: [manual, pre-push]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.15.0 # automatically updated by Commitizen
    hooks:
      - id: commitizen
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.8
    hooks:
      - id: uv-lock
  # ty (Astral's type checker) has no dedicated pre-commit repo yet
  # (see astral-sh/ty#269). Run via uvx as a local hook until one ships.
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty check
        language: system
        types_or: [python, pyi]
        require_serial: true
  - repo: https://github.com/ansible/ansible-lint
    rev: v26.4.0
    hooks:
      - id: ansible-lint
  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.3.0
    hooks:
      - id: tofu_fmt
      - id: tofu_docs
      - id: tofu_tflint
      - id: tofu_validate
      - id: tofu_trivy
      - id: tofu_checkov
      - id: tofu_providers_lock
        args:
          - --hook-config=--mode=always-regenerate-lockfile
# END MANAGED TEMPLATE — add custom content below
