---
# MANAGED BY TEMPLATE (copied 2026-05-23 from 6bed4) — do not edit. Sync from the source template; user must manage overwrites.
name: Test
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-directories:
    runs-on: ubuntu-latest
    outputs:
      molecule_exists: ${{ steps.check_molecule.outputs.molecule_exists }}
      tests_exists: ${{ steps.check_tests.outputs.tests_exists }}
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6
        with:
          path: "${{ github.repository }}"

      - name: Check if molecule directory exists
        id: check_molecule
        run: |
          if [ -d "${{ github.repository }}/molecule" ]; then
            echo "molecule_exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "molecule_exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check if tests directory exists
        id: check_tests
        run: |
          if [ -d "${{ github.repository }}/tests" ]; then
            echo "tests_exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "tests_exists=false" >> "${GITHUB_OUTPUT}"
          fi

  test-pytest:
    needs: check-directories
    if: needs.check-directories.outputs.tests_exists == 'true'
    defaults:
      run:
        working-directory: "${{ github.repository }}"
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6
        with:
          path: "${{ github.repository }}"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8

      - name: Run pytest
        run: uv run --with typer --with pytest pytest tests/

  test-molecule:
    needs: check-directories
    if: needs.check-directories.outputs.molecule_exists == 'true'
    defaults:
      run:
        # Working directory is a relative path from github.workspace
        # Workpace: /home/runner/work/<repo>/<repo>
        # Workng Drectory: /home/runner/work/<repo>/<repo>/<user>/<repo>
        working-directory: "${{ github.repository }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # These are the distros that ansible will be run against
        distro:
          - debian12 # Since most infrastructure is running on debian
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6
        with:
          path: "${{ github.repository }}"

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install -r requirements.txt

      - name: Run Molecule tests.
        run: molecule test
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ${{ matrix.distro }}
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}

